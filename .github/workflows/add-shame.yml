name: Add shame entry

on:
  issues:
    types: [labeled]

jobs:
  add-entry:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Parse issue, fetch avatar, update JSON
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';

            // ── парсинг полей ──
            function field(label) {
              const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`### ${escaped}\\s*\\n\\s*([\\s\\S]*?)(?=\\n### |$)`);
              const m = body.match(re);
              if (!m) return '';
              const v = m[1].trim();
              return (v === '_No response_' || v === 'None') ? '' : v;
            }

            const telegram    = field('Телеграм главного позорника').trim();
            const description = field('Описание ситуации (необязательно)').trim();
            const quoteRaw    = field('Цитата').trim();
            const evidence    = field('Ссылка на сообщение (необязательно)').trim();

            if (!telegram || !quoteRaw) {
              core.setFailed('Не удалось распарсить telegram или quote');
              return;
            }

            // ── парсинг цитаты + даты + картинок ──
            function parseQuote(raw) {
              const lines = raw.split('\n');

              const tgHeader = /^(.+),\s*\[(\d{2})\.(\d{2})\.(\d{4})\s+\d{2}:\d{2}\]$/;
              const altTgLine = /^\[(\d{1,2})\/(\d{1,2})\/(\d{2,4})\s+\d{1,2}:\d{2}(?:\s*[AP]M)?\]\s+(.+?):\s+([\s\S]*)$/i;
              const imgPattern = /(?:<img[^>]+src=["'](https?:\/\/[^\s"']+)["'][^>]*\/?>|!\[.*?\]\((https?:\/\/[^\s)]+)\))/i;

              function extractImage(line) {
                const m = line.match(imgPattern);
                return m ? (m[1] || m[2]) : null;
              }

              function addImage(msg, url) {
                if (!msg.image) {
                  msg.image = url;
                } else if (Array.isArray(msg.image)) {
                  msg.image.push(url);
                } else {
                  msg.image = [msg.image, url];
                }
              }

              let parsedDate = null;

              // ── Формат: "Name, [DD.MM.YYYY HH:MM]" ──
              const hasTg = lines.some(l => tgHeader.test(l.trim()));
              if (hasTg) {
                const msgs = [];
                let from = null;
                let textLines = [];
                let images = [];

                function pushMsg() {
                  if (from && (textLines.length || images.length)) {
                    const msg = { from };
                    const text = textLines.join('\n').trim();
                    if (text) msg.text = text;
                    if (images.length === 1) msg.image = images[0];
                    else if (images.length > 1) msg.image = images;
                    msgs.push(msg);
                  }
                }

                for (const line of lines) {
                  const trimmed = line.trim();
                  const m = trimmed.match(tgHeader);

                  if (m) {
                    pushMsg();
                    from = m[1].trim();
                    textLines = [];
                    images = [];

                    if (!parsedDate) {
                      parsedDate = `${m[4]}-${m[3]}-${m[2]}`;
                    }
                  } else if (from) {
                    const img = extractImage(trimmed);
                    if (img) {
                      images.push(img);
                    } else if (trimmed) {
                      textLines.push(trimmed);
                    }
                  }
                }
                pushMsg();

                const filtered = msgs.filter(m => m.text || m.image);
                if (filtered.length === 0) return { quote: raw, date: parsedDate };
                if (filtered.length === 1 && filtered[0].text && !filtered[0].image) {
                  return { quote: filtered[0].text, date: parsedDate };
                }
                return { quote: filtered, date: parsedDate };
              }

              // ── Формат: "[M/D/YY H:MM AM/PM] Name: text" ──
              const hasAltTg = lines.some(l => altTgLine.test(l.trim()));
              if (hasAltTg) {
                const msgs = [];

                for (const line of lines) {
                  const trimmed = line.trim();
                  if (!trimmed) continue;

                  const m = trimmed.match(altTgLine);
                  if (m) {
                    msgs.push({ from: m[4].trim(), text: m[5].trim() });

                    if (!parsedDate) {
                      const month = m[1].padStart(2, '0');
                      const day = m[2].padStart(2, '0');
                      let year = m[3];
                      if (year.length === 2) year = '20' + year;
                      parsedDate = `${year}-${month}-${day}`;
                    }
                  } else {
                    const img = extractImage(trimmed);
                    if (img && msgs.length > 0) {
                      addImage(msgs[msgs.length - 1], img);
                    } else if (msgs.length > 0) {
                      msgs[msgs.length - 1].text += '\n' + trimmed;
                    }
                  }
                }

                const filtered = msgs.filter(m => m.text || m.image);
                if (filtered.length === 0) return { quote: raw, date: parsedDate };
                if (filtered.length === 1 && filtered[0].text && !filtered[0].image) {
                  return { quote: filtered[0].text, date: parsedDate };
                }
                return { quote: filtered, date: parsedDate };
              }

              // ── @username: text ──
              const dialogPattern = /^@[\w]+:\s*.+$/;
              const nonEmpty = lines.map(l => l.trim()).filter(Boolean);

              if (nonEmpty.length > 1 && nonEmpty.every(l => dialogPattern.test(l))) {
                const result = nonEmpty.map(l => {
                  const idx = l.indexOf(':');
                  return {
                    from: l.slice(0, idx).trim(),
                    text: l.slice(idx + 1).trim()
                  };
                });
                return { quote: result, date: null };
              }

              // ── Простой текст, проверяем картинки ──
              const standaloneImages = [];
              const textOnly = [];
              for (const line of nonEmpty) {
                const img = extractImage(line);
                if (img) standaloneImages.push(img);
                else textOnly.push(line);
              }

              let quote;
              if (textOnly.length > 1) quote = textOnly;
              else quote = textOnly[0] || raw;

              return {
                quote,
                date: null,
                images: standaloneImages.length ? standaloneImages : null
              };
            }

            const { quote: parsedQuote, date: parsedDate, images } = parseQuote(quoteRaw);

            // ── аватарка ──
            const clean = telegram.replace(/^@/, '');
            const avatarDir = 'avatars';
            const avatarPath = `${avatarDir}/${clean}.jpg`;

            if (!fs.existsSync(avatarDir)) {
              fs.mkdirSync(avatarDir, { recursive: true });
            }

            if (!fs.existsSync(avatarPath)) {
              try {
                core.info(`Fetching avatar for @${clean}...`);
                const page = await fetch(`https://t.me/${clean}`, {
                  headers: { 'User-Agent': 'Mozilla/5.0 (compatible; ShameBot/1.0)' },
                  redirect: 'follow',
                });
                const html = await page.text();
                const ogMatch = html.match(
                  /<meta\s+property=["']og:image["']\s+content=["']([^"']+)["']/i
                );

                if (ogMatch && ogMatch[1].startsWith('http')) {
                  const imgUrl = ogMatch[1];
                  const imgRes = await fetch(imgUrl);
                  if (imgRes.ok) {
                    const buf = Buffer.from(await imgRes.arrayBuffer());
                    if (buf.length > 1000) {
                      fs.writeFileSync(avatarPath, buf);
                      core.info(`Avatar saved: ${avatarPath} (${buf.length} bytes)`);
                    } else {
                      core.info('Avatar too small, likely a placeholder — skipping');
                    }
                  }
                } else {
                  core.info('No og:image found');
                }
              } catch (e) {
                core.warning(`Avatar fetch failed: ${e.message}`);
              }
            }

            // ── обновляем JSON ──
            const dataPath = 'data/shame.json';
            const entries = JSON.parse(fs.readFileSync(dataPath, 'utf8'));
            const maxId = entries.reduce((m, e) => Math.max(m, e.id || 0), 0);

            const newEntry = {
              id: maxId + 1,
              telegram: telegram.startsWith('@') ? telegram : `@${telegram}`,
            };
            if (description) newEntry.description = description;
            if (images && images.length === 1) newEntry.images = images[0];
            else if (images && images.length > 1) newEntry.images = images;
            newEntry.quote = parsedQuote;
            newEntry.date = parsedDate || new Date().toISOString().split('T')[0];
            newEntry.evidence = evidence || '';
            newEntry.added_by = context.payload.issue.user.login;

            entries.push(newEntry);
            fs.writeFileSync(dataPath, JSON.stringify(entries, null, 2) + '\n');

            let preview = typeof parsedQuote === 'string'
              ? parsedQuote
              : Array.isArray(parsedQuote) && typeof parsedQuote[0] === 'string'
                ? parsedQuote[0]
                : parsedQuote[0]?.text || '';
            core.exportVariable('SHAME_PREVIEW', preview.substring(0, 50));
            core.exportVariable('ISSUE_NUM', String(context.payload.issue.number));

      - name: Create PR
        run: |
          BRANCH="shame-${{ env.ISSUE_NUM }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add data/shame.json avatars/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 1
          fi

          git commit -m "📛 ${{ env.SHAME_PREVIEW }}... (closes #${{ env.ISSUE_NUM }})"
          git push origin "$BRANCH"
          gh pr create \
            --title "📛 Новая запись на доску позора" \
            --body "Автоматически из #${{ env.ISSUE_NUM }}" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on issue
        if: success()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '✅ PR создан. После мёржа запись появится на сайте 🔥'
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '❌ Что-то пошло не так. Проверьте формат заполнения.'
            });
