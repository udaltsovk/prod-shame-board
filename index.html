<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Доска позора</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-grid"></div>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <header>
      <div class="logo">🏆</div>
      <h1>Доска позора</h1>
      <p class="tagline">Лучшие высказывания чата, увековеченные навсегда</p>
      <div class="header-actions">
        <a
          href="https://github.com/WatLon/prod-shame-board/issues/new?template=shame.yml"
          target="_blank"
          class="btn btn-accent"
          >📛 Номинировать</a
        >
        <a
          href="https://github.com/WatLon/prod-shame-board"
          target="_blank"
          class="btn btn-ghost"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"
            />
          </svg>
          GitHub
        </a>
      </div>
    </header>

    <div class="counter" id="counter"></div>

    <div class="search-wrap">
      <input
        type="text"
        id="search"
        placeholder="🔍 Поиск по цитатам и людям..."
        autocomplete="off"
      />
    </div>

    <main id="board"></main>

    <footer>
      <p>Сделано с участниками чата</p>
      <p class="footer-sub">Автор идеи - Данила Митяшин</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
